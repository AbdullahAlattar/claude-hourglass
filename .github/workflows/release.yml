name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: build & release (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            build-essential \
            libssl-dev \
            libxdo-dev \
            file \
            wget

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Claude Hourglass ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/AbdullahAlattar/claude-hourglass/blob/main/CHANGELOG.md)
            for what's in this release.

            **Linux:** install the .rpm (Fedora/RHEL) or .deb (Ubuntu/Debian),
            or run the AppImage directly.
          releaseDraft: true
          prerelease: false
