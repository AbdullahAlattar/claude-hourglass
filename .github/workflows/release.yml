name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: build & release (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: skip AppImage (linuxdeploy unstable, see issue #1).
          - platform: ubuntu-latest
            args: "--bundles deb rpm"
          # macOS: build .dmg only (.app is just the bundle, contained inside the dmg).
          - platform: macos-latest
            args: "--bundles dmg"

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            build-essential \
            libssl-dev \
            libxdo-dev \
            file \
            wget

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Claude Hourglass ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/AbdullahAlattar/claude-hourglass/blob/main/CHANGELOG.md)
            for what's in this release.

            **Linux:** install the .rpm (Fedora/RHEL) or .deb (Ubuntu/Debian).
            **macOS:** mount the .dmg, drag Claude Hourglass to /Applications. First launch is blocked by Gatekeeper. macOS 14 or earlier: right-click → Open → Open. macOS 15 (Sequoia) or later: System Settings → Privacy & Security → Open Anyway.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
