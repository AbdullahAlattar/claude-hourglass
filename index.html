<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Usage</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="panel" id="panel" data-state="loading">
      <div class="controls">
        <button id="settings" class="icon-btn" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="8" r="2" />
            <path d="M13.5 8a5.5 5.5 0 0 0-.1-1l1.4-1-1.5-2.6-1.7.6a5.5 5.5 0 0 0-1.7-1l-.3-1.7h-3l-.3 1.7a5.5 5.5 0 0 0-1.7 1l-1.7-.6L1.2 6l1.4 1a5.5 5.5 0 0 0 0 2l-1.4 1 1.5 2.6 1.7-.6a5.5 5.5 0 0 0 1.7 1l.3 1.7h3l.3-1.7a5.5 5.5 0 0 0 1.7-1l1.7.6L14.8 10l-1.4-1c.07-.3.1-.66.1-1z" />
          </svg>
        </button>
        <button id="refresh" class="icon-btn" title="Refresh" aria-label="Refresh">
          <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9" />
            <path d="M13.5 2.5v3h-3" />
          </svg>
        </button>
        <button id="close" class="icon-btn" title="Hide (Esc)" aria-label="Close">
          <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
            <path d="M4 4l8 8M12 4l-8 8" />
          </svg>
        </button>
      </div>

      <section class="display">
        <div class="block">
          <div class="figure figure-pct">
            <span class="num" id="percent-num">—</span><span class="sym">%</span>
          </div>
          <div class="caption">current session</div>
        </div>
        <div class="vrule" aria-hidden="true"></div>
        <div class="block">
          <div class="figure figure-time" id="time-figure">—</div>
          <div class="caption">until reset</div>
        </div>
      </section>

      <div class="progress" aria-hidden="true">
        <div class="progress-fill" id="progress-fill" style="--pct: 0%"></div>
      </div>

      <div class="setup-overlay" id="setup-overlay" hidden>
        <div class="cal-title">Connect to claude.ai</div>
        <div class="cal-help">
          Paste your <b>sessionKey</b> cookie. In a browser:
          DevTools → Application → Cookies → claude.ai → copy
          <b>sessionKey</b> value.
        </div>
        <form class="cal-form" id="setup-form">
          <input
            type="password"
            id="setup-input"
            class="setup-text"
            autocomplete="off"
            spellcheck="false"
            placeholder="sk-ant-sid01-..."
          />
          <div class="cal-current" id="setup-current">—</div>
          <div class="cal-actions">
            <button type="button" class="cal-btn cal-btn-ghost" id="setup-clear">disconnect</button>
            <button type="button" class="cal-btn cal-btn-ghost" id="setup-cancel">cancel</button>
            <button type="submit" class="cal-btn cal-btn-primary">save</button>
          </div>
        </form>
      </div>

      <div class="error-overlay" id="error-overlay" hidden>
        <div class="empty-title">Couldn't read usage</div>
        <div class="empty-body" id="error-body">—</div>
      </div>

      <div class="empty-overlay" id="empty-overlay" hidden>
        <div class="empty-title">Not connected</div>
        <div class="empty-body">Click the gear to paste your claude.ai session cookie.</div>
      </div>
    </main>
  </body>
</html>
