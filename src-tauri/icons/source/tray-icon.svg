<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Tray sparkle. Designed to read at 22px on a dark panel.
       Cardinal arms long, diagonals short. Solid white fill, no stroke. -->
  <!-- Cardinal arms: Anthropic orange -->
  <g transform="translate(32 32)" fill="#d97757">
    <path d="M 0 -22 C 1.8 -11 4 -7.5 0 0 C -4 -7.5 -1.8 -11 0 -22 Z"/>
    <path d="M 22 0 C 11 1.8 7.5 4 0 0 C 7.5 -4 11 -1.8 22 0 Z"/>
    <path d="M 0 22 C 1.8 11 4 7.5 0 0 C -4 7.5 -1.8 11 0 22 Z"/>
    <path d="M -22 0 C -11 1.8 -7.5 4 0 0 C -7.5 -4 -11 -1.8 -22 0 Z"/>
  </g>

  <!-- Diagonal arms: deeper orange for depth -->
  <g transform="translate(32 32) rotate(45)" fill="#c25f3f">
    <path d="M 0 -13 C 1.2 -6.5 2.6 -4.5 0 0 C -2.6 -4.5 -1.2 -6.5 0 -13 Z"/>
    <path d="M 13 0 C 6.5 1.2 4.5 2.6 0 0 C 4.5 -2.6 6.5 -1.2 13 0 Z"/>
    <path d="M 0 13 C 1.2 6.5 2.6 4.5 0 0 C -2.6 4.5 -1.2 6.5 0 13 Z"/>
    <path d="M -13 0 C -6.5 1.2 -4.5 2.6 0 0 C -4.5 -2.6 -6.5 -1.2 -13 0 Z"/>
  </g>
</svg>
